<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Chay Palton MIDI.js and TONE.js</title>
    <script src="https://cdn.jsdelivr.net/npm/tone/build/Tone.js"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
</head>

<body>
    <h1>USING MIDI and TONE</h1>

    <p>
        Self contained demo:<p>

            - Using MIDI.js to add (notes, and effects) to a multi tracks MIDI file.<p>
            - Using Tone.Frequency to add music notes to the MIDI files.<p>
<p>
            - Using Tone.js to playback the MIDI.<p>
            - Create a MIDI file to download.<p>
    </p>

    <button id="download">Download MIDI</button>

    <script>

            document.getElementById('download').addEventListener('click', () => {

            // Use MIDI.js to build the MIDI data

            const midi = new Midi();

            // Track 1
            const track1 = midi.addTrack();

            // I used TONE.js to convert music notation to Midi value

            track1.addNote({ midi: Tone.Frequency("C").toMidi(), time: 0, duration: 0.5 });

            // Control Types

            /*
                1: "modulationWheel",
                2: "breath",
                4: "footController",
                5: "portamentoTime",
                7: "volume",
                8: "balance",
                10: "pan",
                64: "sustain",
                65: "portamentoTime",
                66: "sostenuto",
                67: "softPedal",
                68: "legatoFootswitch",
                84: "portamentoControl"
            */

            // Add a control

            track1.addCC({ number: 1, value: 64, time: 0.2 });

            // Track 2

            const track2 = midi.addTrack();
            track2.addNote({ midi: Tone.Frequency("C").toMidi(), time: 0, duration: 0.5 });
            track2.addCC({ number: 64, value: 127, time: 0.1 });

            // Melody
            
            const melody = midi.addTrack();
            const baseTime = 0;

            // Example notes list

            const notes = [
                { note: "C4", time: baseTime + 0.0, duration: 0.3 },
                { note: "D4", time: baseTime + 0.4, duration: 0.3 },
                { note: "E4", time: baseTime + 0.8, duration: 0.3 },
                { note: "F4", time: baseTime + 1.2, duration: 0.3 },
                { note: "G4", time: baseTime + 1.6, duration: 0.3 },
                { note: "A4", time: baseTime + 2.0, duration: 0.3 },
                { note: "B4", time: baseTime + 2.4, duration: 0.3 },
                { note: "C5", time: baseTime + 2.8, duration: 0.6 },
            ];

            notes.forEach(n => {
                melody.addNote({ midi: Tone.Frequency(n.note).toMidi(), time: n.time, duration: n.duration });
            });

            // Example add some individual notes

            melody.addNote({ midi: Tone.Frequency("C").toMidi(), time: baseTime + 3.2, duration: 0.2 });
            melody.addNote({ midi: Tone.Frequency("E").toMidi(), time: baseTime + 3.4, duration: 0.2 });
            melody.addNote({ midi: Tone.Frequency("G").toMidi(), time: baseTime + 3.6, duration: 0.2 });

            // What ever happen before this point is now converted into the actual MIDI data file.

            const midiData = midi.toArray();

            // Keep thinks simple and create an instance of MIDI but use the MIDI data we just built.

            const currentMidi = new Midi(midiData)

            //////////////////////////////////////////////////////////////////////////////////////  
            // TONES.js 
            // I now use tone to play the MIDI data.
            //////////////////////////////////////////////////////////////////////////////////////

            const synth = new Tone.Synth().toDestination();
            const synths = [];
            const now = Tone.now();

            const playing = false

            if (currentMidi) {

                const now = Tone.now() + 0.5;

                currentMidi.tracks.forEach((track) => {

                    // Create a synth for each track.

                    const synth = new Tone.PolySynth(Tone.Synth, {
                        envelope: {
                            attack: 0.02,
                            decay: 0.1,
                            sustain: 0.3,
                            release: 1,
                        },
                    }).toDestination();

                    synths.push(synth);

                    // Schedule all of the events.

                    track.notes.forEach((note) => {
                        synth.triggerAttackRelease(
                            note.name,
                            note.duration,
                            note.time + now,
                            note.velocity
                        );
                    });
                });

            } else {

                // Dispose the synth and make a new one

                while (synths.length) {
                    const synth = synths.shift();
                    synth.disconnect();
                }
            }

            // Generate MIDI data and trigger download

            const blob = new Blob([new Uint8Array(currentMidi)], { type: 'audio/midi' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = 'melody.mid';
            a.click();
            URL.revokeObjectURL(url);
        });
    </script>
</body>

</html>
