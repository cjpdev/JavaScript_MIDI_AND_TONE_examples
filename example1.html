<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <title>Chay Palton MIDI</title>
    <script src="https://cdn.jsdelivr.net/npm/tone/build/Tone.js"></script>
    <script src="https://unpkg.com/@tonejs/midi"></script>
    <script src="chay_helper.js"></script>
</head>

<body>
    <h1>MIDI.JS and TONE.JS</h1>

    <p>
        Simple example with three notes added
    </p>

    <button id="play">Play MIDI</button> <button id="download">Download MIDI</button>

    <script>

        var mididata = null;

        function BuildMusic() {

            // Use MIDI.js to build the MIDI data

            const midi = new Midi();

            // Track 1
            const track = midi.addTrack();

            // Use Tone so we can use music notation
        
            track.addNote({ midi: Tone.Frequency("C1").toMidi(), time: 0, duration: 0.4 });
            track.addNote({ midi: Tone.Frequency("E1").toMidi(), time: 0.4, duration: 0.4 });
            track.addNote({ midi: Tone.Frequency("G1").toMidi(), time: 0.8, duration: 0.4 });

            // What ever happen before this point is now converted into the actual MIDI data file.

            const midiData = midi.toArray();

            // Return the midi data as bytes array.
            return midiData

        }

        document.getElementById('play').addEventListener('click', () => {
            mididata = BuildMusic()
            chay_helper_play(mididata)
        });

        document.getElementById('download').addEventListener('click', () => {
            mididata = BuildMusic()
            chay_helper_play(mididata)
            chay_helper_download(mididata)
        });

    </script>
</body>

</html>
